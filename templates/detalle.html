<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ p.titulo }} | Q°bonita</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --lila-profundo: #7d629b;
            --lila-claro: #f3eff9;
            --texto-oscuro: #2d2d2d;
            --blanco-puro: #ffffff;
            --dorado: #d4af37;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            background-color: var(--lila-claro);
            background-image: url("{{ url_for('static', filename='recursos/patron_flores.png') }}");
            background-attachment: fixed;
            background-size: 300px;
            color: var(--texto-oscuro);
        }

        .glass-overlay {
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Botón de Salida */
        .btn-volver {
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--blanco-puro);
            color: var(--lila-profundo);
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 1000;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-volver:hover {
            background: var(--lila-profundo);
            color: white;
            transform: scale(1.05);
        }

        /* Card Principal */
        .detalle-card {
            background: var(--blanco-puro);
            max-width: 1100px;
            width: 100%;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            display: flex;
            flex-direction: column;
            margin-top: 50px;
        }

        @media (min-width: 850px) {
            .detalle-card { flex-direction: row; min-height: 600px; }
        }

        /* Galería */
        .galeria-side {
            flex: 1.3;
            position: relative;
            background: #fafafa;
        }

        .slider-wrap {
            position: relative;
            height: 100%;
            width: 100%;
        }

        .mySlides {
            display: none;
            height: 100%;
        }

        .mySlides img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Para ver el accesorio completo */
            background: #fff;
        }

        .prev, .next {
            cursor: pointer;
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 20px;
            color: var(--lila-profundo);
            font-weight: bold;
            font-size: 25px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            margin: 0 10px;
            transition: 0.3s;
        }

        .next { right: 0; }
        .prev:hover, .next:hover { background: white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        /* Puntos de navegación */
        .dots-nav {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
        }

        .dot {
            cursor: pointer;
            height: 10px;
            width: 10px;
            margin: 0 6px;
            background-color: #ddd;
            border-radius: 50%;
            display: inline-block;
            transition: 0.3s;
            border: 2px solid white;
        }

        .dot.active {
            background-color: var(--lila-profundo);
            transform: scale(1.3);
        }

        /* Información */
        .info-side {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .info-side h1 {
            font-family: 'Comfortaa';
            font-size: 2.5rem;
            color: var(--lila-profundo);
            margin: 0 0 20px 0;
        }

        .descripcion {
            font-size: 1rem;
            line-height: 1.8;
            color: #555;
            margin-bottom: 30px;
        }

        .precio-box {
            font-size: 2.2rem;
            color: var(--texto-oscuro);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-comprar {
            background: var(--lila-profundo);
            color: white;
            text-align: center;
            padding: 22px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            letter-spacing: 1.5px;
            transition: 0.3s;
        }

        .btn-comprar:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(125, 98, 155, 0.3);
        }

        @media (max-width: 600px) {
            .info-side { padding: 40px 30px; text-align: center; }
            .info-side h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="glass-overlay">
        
        <a href="{{ url_for('index') }}" class="btn-volver">
            <span>←</span> VOLVER A LA VITRINA
        </a>

        <div class="detalle-card">
            
            <div class="galeria-side">
                <div class="slider-wrap">
                    {% for img in p.imagenes %}
                    <div class="mySlides">
                        <img src="{{ img }}" alt="{{ p.titulo }}">
                    </div>
                    {% endfor %}

                    {% if p.imagenes|length > 1 %}
                    <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
                    <a class="next" onclick="plusSlides(1)">&#10095;</a>
                    {% endif %}

                    <div class="dots-nav">
                        {% for img in p.imagenes %}
                        <span class="dot" data-slide-index="{{ loop.index }}"></span>
                        {% endfor %}
                    </div>
                </div>
            </div>

            <div class="info-side">
                <div style="color: var(--dorado); font-weight: 700; font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 10px;">
                    DETALLES DEL PRODUCTO
                </div>
                <h1>{{ p.titulo }}</h1>
                <p class="descripcion">{{ p.descripcion }}</p>
                <div class="precio-box">${{ p.precio }}</div>

                <a href="{{ url_for('comprar', id=p.id) }}" class="btn-comprar">
                    PEDIR POR WHATSAPP ✨
                </a>
            </div>

        </div>

    </div>

    <script>
        let slideIndex = 1;
        showSlides(slideIndex);

        // Función para pasar fotos con flechas
        function plusSlides(n) {
            showSlides(slideIndex += n);
        }

        // Función para los puntos (dots) mejorada para evitar errores en el editor
        document.querySelectorAll('.dot').forEach(dot => {
            dot.addEventListener('click', function() {
                let index = parseInt(this.getAttribute('data-slide-index'));
                showSlides(slideIndex = index);
            });
        });

        function showSlides(n) {
            let i;
            let slides = document.getElementsByClassName("mySlides");
            let dots = document.getElementsByClassName("dot");
            
            if (n > slides.length) {slideIndex = 1}    
            if (n < 1) {slideIndex = slides.length}
            
            for (i = 0; i < slides.length; i++) {
                slides[i].style.display = "none";  
            }
            for (i = 0; i < dots.length; i++) {
                dots[i].classList.remove("active");
            }
            
            if(slides.length > 0) {
                slides[slideIndex-1].style.display = "block";  
                dots[slideIndex-1].classList.add("active");
            }
        }
    </script>

</body>
</html>
